name: deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ghcr.io/aemaething/checker:latest
          build-args: |
            VITE_APP_NAME=Checkers
            VITE_REVERB_APP_KEY=checkers-app
            VITE_REVERB_HOST=checkers.robotnik.net
            VITE_REVERB_SCHEME=https
            VITE_REVERB_PORT=443

  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          pip install ansible
          ansible-galaxy collection install community.docker

      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ vars.SERVER_IP }}" >> ~/.ssh/known_hosts

      - name: Run Ansible playbook
        env:
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook \
            -i "${{ vars.SERVER_IP }}," \
            ansible/deploy.yml \
            --private-key ~/.ssh/deploy_key \
            --extra-vars "ansible_user=root app_key='${{ secrets.APP_KEY }}' db_password='${{ secrets.DB_PASSWORD }}' reverb_app_secret='${{ secrets.REVERB_APP_SECRET }}' ghcr_token='${{ secrets.GHCR_TOKEN }}'" \
            -v

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
